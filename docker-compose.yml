services:
  postgres:
    image: postgres:16-alpine
    container_name: jwt-reactive-postgres
    environment:
      POSTGRES_DB: ${APP_DB_NAME:?APP_DB_NAME is required}
      POSTGRES_USER: ${APP_DB_USER:?APP_DB_USER is required}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:?APP_DB_USER is required} -d ${APP_DB_NAME:?APP_DB_NAME is required}"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.4
    container_name: jwt-reactive-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:?KEYCLOAK_ADMIN_USER is required}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./src/test/resources/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  tempo:
    image: grafana/tempo:2.7.2
    container_name: jwt-reactive-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./ops/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: jwt-reactive-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - tempo
    ports:
      - "9464:9464"
    volumes:
      - ./ops/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: jwt-reactive-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - otel-collector
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  loki:
    image: grafana/loki:3.4.2
    container_name: jwt-reactive-loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  grafana:
    image: grafana/grafana:11.5.2
    container_name: jwt-reactive-grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER is required}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jwt-reactive-app
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      otel-collector:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-jwt-demo-reactive}
      KEYCLOAK_AUTH_SERVER_URL: ${KEYCLOAK_AUTH_SERVER_URL:-http://keycloak:8080}
      KEYCLOAK_RESOURCE_CLIENT_ID: ${KEYCLOAK_RESOURCE_CLIENT_ID}
      KEYCLOAK_RESOURCE_CLIENT_SECRET: ${KEYCLOAK_RESOURCE_CLIENT_SECRET:?KEYCLOAK_RESOURCE_CLIENT_SECRET is required}
      APP_DB_NAME: ${APP_DB_NAME:?APP_DB_NAME is required}
      APP_DB_USER: ${APP_DB_USER:?APP_DB_USER is required}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD is required}
      MANAGEMENT_OTLP_TRACING_ENDPOINT: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:-http://otel-collector:4318/v1/traces}
      MANAGEMENT_OTLP_LOGGING_ENDPOINT: ${MANAGEMENT_OTLP_LOGGING_ENDPOINT:-http://otel-collector:4318/v1/logs}
    ports:
      - "8081:8081"

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:



