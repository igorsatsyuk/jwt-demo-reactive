spring.r2dbc.url=${SPRING_R2DBC_URL:r2dbc:postgresql://postgres:5432/${APP_DB_NAME:appdb}}
spring.r2dbc.username=${APP_DB_USER:app}
spring.r2dbc.password=${APP_DB_PASSWORD}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/${APP_DB_NAME:appdb}}
spring.datasource.username=${APP_DB_USER:app}
spring.datasource.password=${APP_DB_PASSWORD}

spring.flyway.connect-retries=10
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://keycloak:8080}
keycloak.resource-client-id=${KEYCLOAK_RESOURCE_CLIENT_ID}
keycloak.resource-client-secret=${KEYCLOAK_RESOURCE_CLIENT_SECRET}

management.logging.export.otlp.enabled=${MANAGEMENT_OTLP_LOGGING_ENABLED:true}
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
management.otlp.logging.endpoint=${MANAGEMENT_OTLP_LOGGING_ENDPOINT:http://otel-collector:4318/v1/logs}

