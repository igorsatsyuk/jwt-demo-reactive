server.port=8081
spring.application.name=jwt-demo-reactive
spring.main.web-application-type=reactive
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.r2dbc.url=${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/appdb}
spring.r2dbc.username=${SPRING_DATASOURCE_USERNAME:app}
spring.r2dbc.password=${SPRING_DATASOURCE_PASSWORD:app}

# JDBC datasource is used by Flyway only
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/appdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

keycloak.realm=my-realm
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
keycloak.resource-client-id=${KEYCLOAK_RESOURCE_CLIENT_ID}
keycloak.resource-client-secret=${KEYCLOAK_RESOURCE_CLIENT_SECRET}
keycloak.connect-timeout=${KEYCLOAK_CONNECT_TIMEOUT:2s}
keycloak.read-timeout=${KEYCLOAK_READ_TIMEOUT:2s}
keycloak.token-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token
keycloak.logout-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/logout
keycloak.introspection-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token/introspect

spring.security.oauth2.resourceserver.opaque-token.introspection-uri=${keycloak.introspection-url}
spring.security.oauth2.resourceserver.opaque-token.client-id=${keycloak.resource-client-id}
spring.security.oauth2.resourceserver.opaque-token.client-secret=${keycloak.resource-client-secret}

security.dpop.enabled=${SECURITY_DPOP_ENABLED:true}
security.dpop.max-proof-age=${SECURITY_DPOP_MAX_PROOF_AGE:5m}
security.dpop.clock-skew=${SECURITY_DPOP_CLOCK_SKEW:30s}
security.dpop.replay-cache-size=${SECURITY_DPOP_REPLAY_CACHE_SIZE:100000}

management.endpoints.web.exposure.include=prometheus,health
management.endpoint.prometheus.enabled=true
management.endpoint.health.enabled=true
management.tracing.sampling.probability=1.0

spring.cache.type=caffeine
spring.cache.cache-names[0]=filterConfigCache
spring.cache.cache-names[1]=rateLimitBuckets
spring.cache.cache-names[2]=loginBuckets
spring.cache.cache-names[3]=clientsBuckets
spring.cache.caffeine.spec=maximumSize=1000000,expireAfterAccess=3600s

app.rate-limit.rules[0].id=login
app.rate-limit.rules[0].enabled=true
app.rate-limit.rules[0].order=0
app.rate-limit.rules[0].path-pattern=/api/auth/login
app.rate-limit.rules[0].methods[0]=POST
app.rate-limit.rules[0].key-strategy=IP
app.rate-limit.rules[0].cache-name=loginBuckets
app.rate-limit.rules[0].capacity=5
app.rate-limit.rules[0].window-seconds=60

app.rate-limit.rules[1].id=clients
app.rate-limit.rules[1].enabled=true
app.rate-limit.rules[1].order=1
app.rate-limit.rules[1].path-pattern=/api/clients/**
app.rate-limit.rules[1].client-ids[0]=spring-app
app.rate-limit.rules[1].key-strategy=CLIENT_ID
app.rate-limit.rules[1].cache-name=clientsBuckets
app.rate-limit.rules[1].capacity=20
app.rate-limit.rules[1].window-seconds=60

app.clients.search.max-results=${APP_CLIENTS_SEARCH_MAX_RESULTS:20}
app.request.poll-interval-ms=${APP_REQUEST_POLL_INTERVAL_MS:2000}
app.request.worker.interval-ms=${APP_REQUEST_WORKER_INTERVAL_MS:500}
app.request.worker.initial-delay-ms=${APP_REQUEST_WORKER_INITIAL_DELAY_MS:500}
app.request.worker.batch-size=${APP_REQUEST_WORKER_BATCH_SIZE:10}
app.request.worker.retry.max-attempts=${APP_REQUEST_WORKER_RETRY_MAX_ATTEMPTS:3}
app.request.worker.retry.backoff-ms=${APP_REQUEST_WORKER_RETRY_BACKOFF_MS:200}
app.request.worker.processing-timeout=${APP_REQUEST_WORKER_PROCESSING_TIMEOUT:2m}
