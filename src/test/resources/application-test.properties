spring.flyway.enabled=true
spring.reactor.context-propagation=limited

# Disable OTLP export in tests (no collector running)
management.tracing.export.otlp.enabled=false
management.opentelemetry.tracing.export.otlp.enabled=false
management.logging.export.otlp.enabled=false
management.health.r2dbc.enabled=false
spring.r2dbc.pool.validation-query=SELECT 1
logging.level.org.springframework=INFO
logging.level.lt.satsyuk=DEBUG

keycloak.resource-client-id=resource-server
keycloak.resource-client-secret=test-secret
keycloak.introspection-url=http://localhost/introspect

spring.security.oauth2.resourceserver.opaque-token.introspection-uri=${keycloak.introspection-url}
spring.security.oauth2.resourceserver.opaque-token.client-id=${keycloak.resource-client-id}
spring.security.oauth2.resourceserver.opaque-token.client-secret=${keycloak.resource-client-secret}

# Test-specific rate-limit config must define full list entries; partial list overrides break binding.
app.rate-limit.rules[0].id=login
app.rate-limit.rules[0].enabled=true
app.rate-limit.rules[0].order=0
app.rate-limit.rules[0].path-pattern=/api/auth/login
app.rate-limit.rules[0].methods[0]=POST
app.rate-limit.rules[0].key-strategy=IP
app.rate-limit.rules[0].cache-name=loginBuckets
app.rate-limit.rules[0].capacity=1000
app.rate-limit.rules[0].window-seconds=60

app.rate-limit.rules[1].id=clients
app.rate-limit.rules[1].enabled=true
app.rate-limit.rules[1].order=1
app.rate-limit.rules[1].path-pattern=/api/clients/**
app.rate-limit.rules[1].client-ids[0]=spring-app
app.rate-limit.rules[1].key-strategy=CLIENT_ID
app.rate-limit.rules[1].cache-name=clientsBuckets
app.rate-limit.rules[1].capacity=1000
app.rate-limit.rules[1].window-seconds=60

app.request.worker.interval-ms=100
app.request.worker.initial-delay-ms=50
app.request.worker.batch-size=5
app.request.worker.retry.max-attempts=2
app.request.worker.retry.backoff-ms=20
app.request.worker.processing-timeout=5s

