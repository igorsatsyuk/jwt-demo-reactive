global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: jwt-demo-reactive
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["app:8081"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

