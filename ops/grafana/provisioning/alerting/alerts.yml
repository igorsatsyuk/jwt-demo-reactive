apiVersion: 1

groups:
  - orgId: 1
    name: jwt-demo-reactive-red-saturation
    folder: JWT Demo Reactive
    interval: 1m
    rules:
      - uid: jwt-high-5xx-rate
        title: High 5xx Error Rate
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              editorMode: code
              expr: 100 * sum(rate(http_server_requests_seconds_count{application="jwt-demo-reactive",status=~"5.."}[5m])) / clamp_min(sum(rate(http_server_requests_seconds_count{application="jwt-demo-reactive"}[5m])), 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [5]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: 5xx error rate is above 5% for 5 minutes.
        labels:
          severity: warning
          service: jwt-demo-reactive

      - uid: jwt-high-p95-latency
        title: High P95 Latency
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              editorMode: code
              expr: 1000 * histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application="jwt-demo-reactive"}[5m])) by (le))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [800]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: P95 HTTP latency is above 800 ms for 5 minutes.
        labels:
          severity: warning
          service: jwt-demo-reactive

      - uid: jwt-high-cpu-saturation
        title: High CPU Saturation
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              editorMode: code
              expr: 100 * avg(process_cpu_usage{application="jwt-demo-reactive"})
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [90]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: Process CPU usage is above 90% for 10 minutes.
        labels:
          severity: critical
          service: jwt-demo-reactive

      - uid: jwt-high-heap-saturation
        title: High Heap Saturation
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              editorMode: code
              expr: 100 * sum(jvm_memory_used_bytes{application="jwt-demo-reactive",area="heap"}) / clamp_min(sum(jvm_memory_max_bytes{application="jwt-demo-reactive",area="heap"}), 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [90]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: JVM heap usage is above 90% for 10 minutes.
        labels:
          severity: critical
          service: jwt-demo-reactive

      - uid: jwt-high-rate-limit-reject-ratio
        title: High Rate Limit Reject Ratio
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              editorMode: code
              expr: 100 * sum(rate(security_rate_limit_decisions_total{decision="rejected",application="jwt-demo-reactive"}[5m])) / clamp_min(sum(rate(security_rate_limit_decisions_total{application="jwt-demo-reactive"}[5m])), 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [20]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Rate-limit reject ratio is above 20% for 5 minutes.
        labels:
          severity: warning
          service: jwt-demo-reactive

      - uid: jwt-dpop-reject-spike
        title: DPoP Reject Spike
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              editorMode: code
              expr: sum(increase(security_dpop_rejected_total{application="jwt-demo-reactive"}[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 300
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [20]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: DPoP rejects exceeded 20 events in 5 minutes.
        labels:
          severity: warning
          service: jwt-demo-reactive

      - uid: jwt-worker-failed-terminal-ratio
        title: High Worker Failed Ratio
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              expr: 100 * sum(rate(request_worker_terminal_status_total{status="FAILED",application="jwt-demo-reactive"}[10m])) / clamp_min(sum(rate(request_worker_terminal_status_total{application="jwt-demo-reactive"}[10m])), 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 600
              to: 0
            model:
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 10m
        annotations:
          summary: Worker FAILED terminal ratio is above 10% for 10 minutes.
        labels:
          severity: warning
          service: jwt-demo-reactive

