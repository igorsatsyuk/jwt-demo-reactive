apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: TraceID
          # OTLP path: otel-collector transform/logs embeds "trace_id=<32hex>" into
          # the log body for every traced request (non-zero trace_id).
          matcherRegex: "trace_id=([0-9a-f]{32})"
          datasourceUid: tempo
          url: '${__value.raw}'
          urlDisplayLabel: 'Open in Tempo'

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        # Full-text search: job label set by otel-collector from service.name.
        # trace_id is embedded in the log body by the transform/logs processor,
        # so |= works without promoting traceId to a high-cardinality label.
        customQuery: true
        query: '{job="jwt-demo-reactive"} |= "${__trace.traceId}"'
      serviceMap:
        datasourceUid: prometheus

